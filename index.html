<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Robbie Ski Sprint</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="layout">
    <h1>Robbie Ski Sprint</h1>

    <section class="hud">
      <div>Tijd: <span id="timeLeft">30.0</span>s</div>
      <div>Afstand: <span id="distanceLeft">1000</span>m</div>
      <div>Score: <span id="scoreValue">0</span></div>
      <div>Highscore: <span id="highScoreValue">0</span></div>
      <div>Status: <span id="statusText">Klaar</span></div>
    </section>

    <canvas id="gameCanvas" width="960" height="540" aria-label="Ski game canvas"></canvas>

    <section class="controls">
      <button id="startButton">Start ronde</button>
      <p>
        Doel: haal de finish binnen 30 seconden.<br>
        Obstakels: boompjes, skiers en sneeuwpoppetjes.<br>
        Botsen = vallen, opstaan kost tijd en punten.
      </p>
    </section>
  </main>

  <script src="game.js"></script>
</body>
</html>
